<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>手机剪辑零基础入门课</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080c;--glass:rgba(255,255,255,.035);--border:rgba(255,255,255,.07);
  --accent:#7c5cfc;--accent2:#00d4ff;--text:#eeeef5;--muted:#5e5e7e;
  --r:20px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Outfit',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
body{background-image:
  radial-gradient(ellipse at 12% 48%,rgba(108,92,231,.10)0%,transparent 50%),
  radial-gradient(ellipse at 85% 18%,rgba(0,212,255,.07)0%,transparent 50%),
  radial-gradient(ellipse at 50% 92%,rgba(108,92,231,.04)0%,transparent 50%)}
body::before{content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0}

#app{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;z-index:1}

.slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .45s cubic-bezier(.4,0,.2,1),transform .45s cubic-bezier(.4,0,.2,1);
  transform:translateX(50px) scale(.98)}
.slide.active{opacity:1;pointer-events:auto;transform:translateX(0) scale(1)}
.slide.exit-l{opacity:0;transform:translateX(-50px) scale(.98)}

.si{width:min(100vw,177.78vh);height:min(100vh,56.25vw);display:flex;position:relative;overflow:hidden}
.si::after{content:'';position:absolute;left:48%;top:12%;bottom:12%;width:1px;
  background:linear-gradient(180deg,transparent,rgba(124,92,231,.18),transparent);pointer-events:none}

.sl{width:48%;height:100%;display:flex;align-items:center;justify-content:center;padding:.45rem .7rem .45rem 2.2rem;position:relative}
.sl svg{max-width:90%;max-height:85%;filter:drop-shadow(0 4px 24px rgba(124,92,231,.06))}
.phone-shot{height:min(91vh,86%);max-height:820px;max-width:96%;aspect-ratio:9/16;border-radius:34px;overflow:hidden;position:relative;
  background:#0b0b10;border:1px solid rgba(255,255,255,.12);
  box-shadow:0 30px 96px rgba(0,0,0,.54),0 0 72px rgba(124,92,231,.20)}
.phone-shot::before{content:'';position:absolute;inset:0;border-radius:inherit;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.08),inset 0 0 22px rgba(255,255,255,.05);
  pointer-events:none;z-index:2}
.phone-shot img{width:100%;height:100%;object-fit:cover;display:block}
.phone-pair{display:flex;align-items:center;justify-content:center;gap:1.45rem;width:100%;height:100%}
.phone-pair .phone-shot{height:min(82vh,78%);max-height:720px;max-width:45%}
.sr{width:52%;height:100%;display:flex;align-items:center;padding:2.3rem 3.2rem 2.3rem .6rem}
.sri{max-width:820px;width:100%}

.badge{display:inline-block;font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--accent);background:rgba(124,92,231,.1);padding:.35em 1em;border-radius:100px;
  margin-bottom:1rem;font-weight:600}
h1{font-size:clamp(2.15rem,4.7vw,3.75rem);font-weight:800;line-height:1.12;letter-spacing:-.025em;margin-bottom:1rem}
h1 em{font-style:normal;background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
h2{font-size:clamp(1.7rem,3.35vw,2.65rem);font-weight:700;line-height:1.2;margin-bottom:.95rem}
h2 em{font-style:normal;color:var(--accent)}
.sub{font-size:clamp(1.1rem,1.75vw,1.42rem);color:var(--muted);line-height:1.62;margin-bottom:1.45rem}
.bullets,.nums{list-style:none;display:flex;flex-direction:column;gap:.68rem}
.bullets li{font-size:clamp(1.04rem,1.5vw,1.28rem);color:rgba(238,238,245,.78);line-height:1.58;
  padding-left:1.4rem;position:relative}
.bullets li::before{content:'';position:absolute;left:0;top:.55em;width:5px;height:5px;
  border-radius:50%;background:var(--accent);opacity:.55}
.nums{counter-reset:n}
.nums li{counter-increment:n;font-size:clamp(1.04rem,1.5vw,1.28rem);color:rgba(238,238,245,.78);
  line-height:1.55;padding-left:2rem;position:relative}
.nums li::before{content:counter(n);position:absolute;left:0;top:.12em;width:1.35em;height:1.35em;
  border-radius:7px;background:rgba(124,92,231,.13);color:var(--accent);font-size:.72em;
  font-weight:600;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace}

.gcard{background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border);border-radius:var(--r);padding:1.28rem 1.5rem;margin-top:.8rem}
.gcard p{font-size:clamp(.98rem,1.4vw,1.16rem);color:rgba(238,238,245,.66);line-height:1.62}

.toc-row{display:flex;align-items:center;gap:.7rem;padding:.45rem 0;
  border-bottom:1px solid rgba(255,255,255,.035)}
.toc-n{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--accent);min-width:1.6em}
.toc-t{font-size:clamp(.84rem,1.2vw,1.02rem);color:rgba(238,238,245,.65)}

.nav{position:fixed;top:50%;transform:translateY(-50%);z-index:100;width:44px;height:44px;
  border-radius:50%;border:1px solid var(--border);background:rgba(8,8,12,.55);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  color:var(--text);font-size:1.15rem;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all .2s ease;font-family:inherit}
.nav:hover{background:rgba(124,92,231,.14);border-color:rgba(124,92,231,.25)}
.nav:disabled{opacity:.15;cursor:default}
.nav:disabled:hover{background:rgba(8,8,12,.55);border-color:var(--border)}
.np{left:.8rem}.nn{right:.8rem}

.prog{position:fixed;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.03);z-index:100}
.prog-f{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .35s ease;width:0}
.cnt{position:fixed;bottom:.7rem;right:1.2rem;font-size:.68rem;color:var(--muted);
  font-family:'DM Mono',monospace;letter-spacing:.06em;z-index:100}

.cover-t{font-size:clamp(2.55rem,5.9vw,4.45rem);font-weight:800;line-height:1.08;letter-spacing:-.03em}
.sec-t{font-size:clamp(2.15rem,4.55vw,3.6rem);font-weight:700;line-height:1.15}
.sec-n{font-family:'DM Mono',monospace;font-size:clamp(.65rem,.9vw,.8rem);
  color:var(--accent2);letter-spacing:.1em;margin-bottom:.5rem;display:block}

/* --- PPT Presenter Console CSS --- */
.ppt-console {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(12, 12, 20, 0.75);
  border: 1px solid rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 6px 16px;
  border-radius: 100px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.02);
  transition: opacity 0.3s ease, transform 0.3s ease, bottom 0.3s ease;
}
.ppt-console:hover {
  border-color: rgba(124, 92, 231, 0.3);
  box-shadow: 0 10px 45px rgba(124, 92, 231, 0.2), inset 0 0 20px rgba(255, 255, 255, 0.04);
}
.console-btn {
  background: none;
  border: none;
  color: rgba(238, 238, 245, 0.65);
  font-size: 1.1rem;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  padding: 0;
}
.console-btn:hover:not(:disabled) {
  background: rgba(124, 92, 231, 0.25);
  color: #fff;
  transform: scale(1.08);
}
.console-btn:disabled {
  opacity: 0.2;
  cursor: not-allowed;
}
.console-btn.active {
  background: rgba(124, 92, 231, 0.45);
  color: #00d4ff;
  box-shadow: 0 0 12px rgba(124, 92, 231, 0.4);
}
.console-sep {
  color: rgba(255, 255, 255, 0.12);
  font-size: 0.9rem;
  user-select: none;
  margin: 0 2px;
}

/* --- Grid Modal CSS --- */
.grid-modal {
  position: fixed;
  inset: 0;
  background: rgba(5, 5, 8, 0.88);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s cubic-bezier(.4,0,.2,1);
  display: flex;
  align-items: center;
  justify-content: center;
}
.grid-modal.open {
  opacity: 1;
  pointer-events: auto;
}
.grid-modal-content {
  width: 92%;
  max-width: 1200px;
  height: 85%;
  background: rgba(15, 15, 25, 0.75);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 24px;
  box-shadow: 0 30px 100px rgba(0, 0, 0, 0.7);
  padding: 24px 30px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.grid-modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  padding-bottom: 12px;
}
.grid-modal-header h3 {
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--text);
}
.grid-modal-close {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 2rem;
  cursor: pointer;
  line-height: 1;
  transition: color 0.2s;
}
.grid-modal-close:hover {
  color: #fff;
}
.grid-container {
  flex: 1;
  overflow-y: auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
  padding-right: 8px;
}
.grid-container::-webkit-scrollbar {
  width: 6px;
}
.grid-container::-webkit-scrollbar-track {
  background: rgba(255, 255, 255, 0.02);
  border-radius: 3px;
}
.grid-container::-webkit-scrollbar-thumb {
  background: rgba(124, 92, 231, 0.35);
  border-radius: 3px;
}
.grid-item {
  background: rgba(255, 255, 255, 0.025);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 12px;
  padding: 14px;
  cursor: pointer;
  transition: all 0.22s ease;
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
  overflow: hidden;
}
.grid-item::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(124, 92, 231, 0.08), rgba(0, 212, 255, 0.04));
  opacity: 0;
  transition: opacity 0.22s ease;
  pointer-events: none;
}
.grid-item:hover {
  border-color: rgba(124, 92, 231, 0.35);
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
}
.grid-item:hover::before {
  opacity: 1;
}
.grid-item.active {
  border-color: var(--accent);
  background: rgba(124, 92, 231, 0.1);
  box-shadow: 0 0 15px rgba(124, 92, 231, 0.15);
}
.grid-item-num {
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  color: var(--accent2);
  font-weight: 600;
  z-index: 1;
}
.grid-item-title {
  font-size: 0.88rem;
  color: rgba(238, 238, 245, 0.85);
  font-weight: 600;
  line-height: 1.4;
  z-index: 1;
}
.grid-item-badge {
  font-size: 0.72rem;
  color: var(--muted);
  z-index: 1;
  margin-top: auto;
}

/* --- Help Modal CSS --- */
.help-modal {
  position: fixed;
  inset: 0;
  background: rgba(5, 5, 8, 0.85);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  z-index: 1100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}
.help-modal.open {
  opacity: 1;
  pointer-events: auto;
}
.help-modal-content {
  background: rgba(20, 20, 30, 0.9);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 20px;
  padding: 30px;
  width: 90%;
  max-width: 520px;
  box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.help-modal-content h3 {
  font-size: 1.25rem;
  color: var(--text);
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  padding-bottom: 10px;
}
.help-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.help-list li {
  display: flex;
  justify-content: space-between;
  font-size: 0.88rem;
  line-height: 1.4;
}
.help-list li span:first-child {
  color: var(--muted);
  font-weight: 600;
  min-width: 90px;
}
.help-list li span:last-child {
  color: rgba(238, 238, 245, 0.8);
  text-align: right;
}
.help-modal-close-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  transition: background 0.2s;
  margin-top: 10px;
}
.help-modal-close-btn:hover {
  background: #6c5ce7;
}

/* Hide navigation buttons in full screen presentation mode */
body.fullscreen-mode .nav {
  opacity: 0;
  pointer-events: none;
}
body.fullscreen-mode .cnt {
  opacity: 0.35;
}
body.fullscreen-mode .ppt-console {
  opacity: 0.12;
}
body.fullscreen-mode .ppt-console:hover {
  opacity: 1;
}

/* iOS Safari immersive mode (CSS-based fullscreen fallback) */
body.ios-immersive .nav {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
body.ios-immersive .cnt {
  opacity: 0.2;
  transition: opacity 0.3s;
}
body.ios-immersive .ppt-console {
  opacity: 0.08;
  transition: opacity 0.3s;
  bottom: 6px;
}
body.ios-immersive .ppt-console:hover,
body.ios-immersive .ppt-console:focus-within {
  opacity: 1;
}
/* 隐藏当前幻灯片的内容区不显示页码跳动 */
body.ios-immersive .slide-counter {
  opacity: 0.15;
}

/* Export Toast Style */
.export-toast {
  position: fixed;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(15, 15, 25, 0.88);
  border: 1px solid var(--accent);
  box-shadow: 0 10px 40px rgba(124, 92, 231, 0.35);
  border-radius: 12px;
  padding: 12px 24px;
  color: #fff;
  z-index: 2000;
  font-size: 0.9rem;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all 0.3s ease;
  pointer-events: none;
}

/* --- Print PDF Media Styles --- */
@media print {
  html, body, #app {
    height: auto !important;
    overflow: visible !important;
    background: #08080c !important;
    color: #eeeef5 !important;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
  .slide {
    position: relative !important;
    display: flex !important;
    opacity: 1 !important;
    pointer-events: auto !important;
    transform: none !important;
    transition: none !important;
    page-break-after: always !important;
    break-after: page !important;
    width: 100vw !important;
    height: 100vh !important;
  }
  .nav, .prog, .cnt, .ppt-console, #drawing-canvas, #laser-pointer, .grid-modal, .help-modal {
    display: none !important;
  }
}

@media(max-width:900px){
  .si{flex-direction:column;width:100vw;height:100vh}
  .sl,.sr{width:100%;height:50%;padding:1.2rem}
  .sr{align-items:flex-start;padding-top:0}
  .si::after{display:none}
  .sl svg{max-height:90%}
  .phone-shot{height:min(92%,430px);max-width:80%}
  .phone-pair{gap:.8rem}
  .phone-pair .phone-shot{height:min(88%,390px);max-width:43%}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
</head>
<body>
<canvas id="drawing-canvas" style="position:fixed; inset:0; z-index:90; pointer-events:none; cursor:crosshair;"></canvas>
<div id="laser-pointer" style="position:fixed; width:16px; height:16px; border-radius:50%; background:rgba(255,0,0,0.85); box-shadow:0 0 12px rgba(255,0,0,0.9), 0 0 24px rgba(255,0,0,0.6); pointer-events:none; z-index:95; display:none; transform:translate(-50%, -50%); transition: transform 0.04s ease-out;"></div>
<div id="app"></div>
<button class="nav np" id="prev" aria-label="上一页">&#8249;</button>
<button class="nav nn" id="next" aria-label="下一页">&#8250;</button>
<div class="prog"><div class="prog-f" id="pf"></div></div>
<div class="cnt" id="ct">01 / 52</div>

<!-- PPT Console Controls -->
<div class="ppt-console" id="ppt-console">
  <button class="console-btn" id="btn-prev" title="上一页 (➔/➔)">&#8249;</button>
  <button class="console-btn" id="btn-next" title="下一页 (➔/➔/Space)">&#8250;</button>
  <span class="console-sep">|</span>
  <button class="console-btn" id="btn-play" title="自动播放">▶️</button>
  <button class="console-btn" id="btn-pen" title="屏幕画笔 (P)">✏️</button>
  <button class="console-btn" id="btn-laser" title="激光指示器 (L)">🔴</button>
  <button class="console-btn" id="btn-clear" title="清空画笔 (C)" style="display:none;">🗑️</button>
  <button class="console-btn" id="btn-grid" title="网格目录 (G)">📅</button>
  <button class="console-btn" id="btn-fullscreen" title="全屏演示 (F)">🖥️</button>
  <button class="console-btn" id="btn-export" title="导出为 PowerPoint PPTX 文件">💾</button>
  <button class="console-btn" id="btn-pdf" title="打印/另存为 PDF">📄</button>
  <span class="console-sep">|</span>
  <button class="console-btn" id="btn-help" title="使用帮助 (❓)">❓</button>
</div>

<!-- Slide Grid Directory -->
<div class="grid-modal" id="grid-modal">
  <div class="grid-modal-content">
    <div class="grid-modal-header">
      <h3>课程幻灯片目录（共 52 页）</h3>
      <button class="grid-modal-close" id="grid-close">&times;</button>
    </div>
    <div class="grid-container" id="grid-container"></div>
  </div>
</div>

<!-- Help Guide -->
<div class="help-modal" id="help-modal">
  <div class="help-modal-content">
    <h3>⌨️ PPT 演示模式快捷键指南</h3>
    <ul class="help-list">
      <li><span>下一页</span><span>空格键 (Space) / 右方向键 (➔) / 下方向键 (➔) / 滚轮下滚 / 翻页笔</span></li>
      <li><span>上一页</span><span>左方向键 (➔) / 上方向键 (➔) / 滚轮上滚</span></li>
      <li><span>全屏切换</span><span>F 键 或 F11 键</span></li>
      <li><span>画笔模式</span><span>P 键 (开启后可在屏幕涂鸦，再按关闭)</span></li>
      <li><span>激光笔模式</span><span>L 键 (开启后鼠标变红点，再按关闭)</span></li>
      <li><span>清除画笔</span><span>C 键 (清除当前所有屏幕涂鸦)</span></li>
      <li><span>网格目录</span><span>G 键 (开启/关闭全局幻灯片网格)</span></li>
      <li><span>退出状态</span><span>Esc 键 (退出网格目录或画笔/激光笔)</span></li>
    </ul>
    <button class="help-modal-close-btn" id="help-close-btn">知道了</button>
  </div>
</div>

<script>

// ---- 5 什么是视频剪辑 ----
{type:'content',badge:'基础概念',title:'什么是<em>视频剪辑</em>',html:`
  <p class="sub">视频剪辑 = 把拍摄的原始素材，通过剪切、拼接、添加效果，变成一个完整的视频作品</p>
  <ul class="nums">
    <li><strong>选取</strong> — 从大量素材中挑出有用的片段</li>
    <li><strong>裁剪</strong> — 去掉不需要的开头、结尾、中间废镜头</li>
    <li><strong>拼接</strong> — 把多个片段按故事线组合在一起</li>
    <li><strong>包装</strong> — 添加音乐、文字、特效让视频更精彩</li>

// ---- 11 裁剪时长 ----
{type:'content',badge:'相册剪辑',title:'裁剪视频<em>时长</em>',html:`
  <p class="sub">最基础的操作：去掉视频开头或结尾多余的部分</p>
  <ul class="nums">
    <li>进入编辑后，底部出现时间线，两端有<strong>黄色滑块</strong></li>

/* ====== Render ====== */
const app = document.getElementById('app');
let cur = Math.min(Math.max((parseInt(location.hash.replace('#',''),10) || 1) - 1, 0), D.length - 1);

function render() {
  app.innerHTML = D.map((d, i) => {
    const isCover = d.type === 'cover';
    const isSec = d.type === 'section';
    let rightHTML = '';
    if (isCover) {
      rightHTML = d.html;
    } else if (isSec) {
      rightHTML = `<span class="sec-n">Part ${d.num}</span><h2 class="sec-t">${d.title}</h2><p class="sub">${d.sub}</p>`;
    } else {
      rightHTML = `<div class="badge">${d.badge}</div><h2>${d.title}</h2>${d.html}`;
    }
    const leftHTML = i < 51 ? shot(`slide${String(i+1).padStart(2,'0')}-gen-v1.png`, `第${i+1}页配图`) : (SHOTS[i] || d.svg);
    return `<div class="slide${i === cur ? ' active' : ''}" data-i="${i}">
      <div class="si">
        <div class="sl">${leftHTML}</div>
        <div class="sr"><div class="sri">${rightHTML}</div></div>
      </div>
    </div>`;
  }).join('');
}

function go(to) {
  if (to < 0 || to >= D.length || to === cur) return;
  const slides = app.querySelectorAll('.slide');
  const prev = slides[cur];
  const next = slides[to];
  prev.classList.remove('active');
  prev.classList.add('exit-l');
  setTimeout(() => prev.classList.remove('exit-l'), 500);
  next.classList.add('active');
  cur = to;
  // 切换幻灯片时清空当前画画板
  clearDrawing();
  updateUI();
}

function updateUI() {
  document.getElementById('pf').style.width = ((cur + 1) / D.length * 100) + '%';
  document.getElementById('ct').textContent = String(cur + 1).padStart(2, '0') + ' / ' + D.length;
  
  // 经典上一页下一页按钮
  document.getElementById('prev').disabled = cur === 0;
  document.getElementById('next').disabled = cur === D.length - 1;
  
  // PPT 控制台上一页下一页按钮
  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === D.length - 1;

  // 更新目录高亮
  const gridItems = document.querySelectorAll('.grid-item');
  gridItems.forEach((item, idx) => {
    if (idx === cur) {
      item.classList.add('active');
      // 自动滚动到可视区域
      if (gridOpen) {
        item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    } else {
      item.classList.remove('active');
    }
  });
}

render();

/* ==========================================================================
   PPT Presentation Mode Interactive Features
   ========================================================================== */

/* --- Autoplay Playback --- */
let autoplayTimer = null;
let autoplayMode = false;
function toggleAutoplay() {
  autoplayMode = !autoplayMode;
  const btn = document.getElementById('btn-play');
  if (autoplayMode) {
    btn.innerHTML = '⏸️';
    btn.classList.add('active');
    autoplayTimer = setInterval(() => {
      if (cur < D.length - 1) {
        go(cur + 1);
      } else {
        go(0); // 播放完毕回到第一页循环
      }
    }, 5000);
  } else {
    btn.innerHTML = '▶️';
    btn.classList.remove('active');
    clearInterval(autoplayTimer);
  }
}

/* --- Fullscreen Presentation (iOS Safari Compatible) --- */
function isiOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) || 
         (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

function toggleFullscreen() {
  // iOS Safari does not support standard Fullscreen API on regular elements
  // Use CSS immersive mode as reliable fallback
  if (isiOS()) {
    const isImmersive = document.body.classList.contains('ios-immersive');
    if (!isImmersive) {
      document.body.classList.add('ios-immersive');
      document.getElementById('btn-fullscreen').classList.add('active');
      document.getElementById('btn-fullscreen').innerHTML = '⛶';
      // Show tip on first use
      showToast('已进入沉浸模式！再次点击全屏按钮可退出。');
    } else {
      document.body.classList.remove('ios-immersive');
      document.getElementById('btn-fullscreen').classList.remove('active');
      document.getElementById('btn-fullscreen').innerHTML = '🖥️';
    }
    return;
  }

  // Standard browsers
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().then(() => {
      document.body.classList.add('fullscreen-mode');
      document.getElementById('btn-fullscreen').classList.add('active');
    }).catch(err => {
      console.error("无法启动全屏演示: ", err);
    });
  } else {
    document.exitFullscreen().then(() => {
      document.body.classList.remove('fullscreen-mode');
      document.getElementById('btn-fullscreen').classList.remove('active');
    });
  }
}
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    document.body.classList.remove('fullscreen-mode');
    document.getElementById('btn-fullscreen').classList.remove('active');
  }
});

/* --- Canvas Screen Drawing Pen --- */
const canvas = document.getElementById('drawing-canvas');
const ctx = canvas.getContext('2d');
let penMode = false;
let isDrawing = false;
let lastX = 0;
let lastY = 0;
const penColor = '#7c5cfc'; // 主题渐变紫色
const penWidth = 4;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function togglePen() {
  penMode = !penMode;
  const btnPen = document.getElementById('btn-pen');
  const btnClear = document.getElementById('btn-clear');
  
  if (penMode) {
    btnPen.classList.add('active');
    btnClear.style.display = 'flex';
    canvas.style.pointerEvents = 'auto';
    // 如果激光笔开着，关闭它
    if (laserMode) toggleLaser();
  } else {
    btnPen.classList.remove('active');
    btnClear.style.display = 'none';
    canvas.style.pointerEvents = 'none';
    stopDrawing();
  }
}

function startDrawing(e) {
  if (!penMode) return;
  isDrawing = true;
  lastX = e.clientX;
  lastY = e.clientY;
}

function draw(e) {
  if (!isDrawing || !penMode) return;
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(e.clientX, e.clientY);
  ctx.strokeStyle = penColor;
  ctx.lineWidth = penWidth;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();
  lastX = e.clientX;
  lastY = e.clientY;
}

function stopDrawing() {
  isDrawing = false;
}

function clearDrawing() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// Mouse events
canvas.addEventListener('mousedown', startDrawing);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', stopDrawing);
canvas.addEventListener('mouseout', stopDrawing);

// Touch events
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  startDrawing({ clientX: t.clientX, clientY: t.clientY });
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  const t = e.touches[0];
  draw({ clientX: t.clientX, clientY: t.clientY });
}, { passive: true });
canvas.addEventListener('touchend', stopDrawing, { passive: true });

/* --- Interactive Laser Pointer --- */
const laser = document.getElementById('laser-pointer');
let laserMode = false;

document.addEventListener('mousemove', e => {
  if (!laserMode) return;
  laser.style.left = e.clientX + 'px';
  laser.style.top = e.clientY + 'px';
});

function toggleLaser() {
  laserMode = !laserMode;
  const btnLaser = document.getElementById('btn-laser');
  
  if (laserMode) {
    laser.style.display = 'block';
    document.body.style.cursor = 'none';
    canvas.style.cursor = 'none';
    btnLaser.classList.add('active');
    // 如果画笔开着，关闭画笔
    if (penMode) togglePen();
  } else {
    laser.style.display = 'none';
    document.body.style.cursor = 'default';
    canvas.style.cursor = 'crosshair';
    btnLaser.classList.remove('active');
  }
}

/* --- Slide Catalog Grid --- */
let gridOpen = false;
const gridModal = document.getElementById('grid-modal');

function toggleGrid() {
  gridOpen = !gridOpen;
  if (gridOpen) {
    renderGrid();
    gridModal.classList.add('open');
    document.getElementById('btn-grid').classList.add('active');
  } else {
    gridModal.classList.remove('open');
    document.getElementById('btn-grid').classList.remove('active');
  }
}

function cleanTitle(title) {
  if (!title) return '';
  return title.replace(/<\/?[^>]+(>|$)/g, "");
}

function renderGrid() {
  const container = document.getElementById('grid-container');
  container.innerHTML = D.map((d, i) => {
    let t = '';
    if (d.type === 'cover') {
      t = '开始封面';
    } else if (d.type === 'section') {
      t = d.title;
    } else {
      t = d.title;
    }
    const badge = d.badge || (d.type === 'cover' ? '封面' : d.type === 'section' ? '章节过渡' : '页面');
    return `<div class="grid-item${i === cur ? ' active' : ''}" data-idx="${i}">
      <span class="grid-item-num">Slide ${String(i+1).padStart(2, '0')}</span>
      <span class="grid-item-title">${cleanTitle(t)}</span>
      <span class="grid-item-badge">${badge}</span>
    </div>`;
  }).join('');
  
  // 绑定点击跳转事件
  container.querySelectorAll('.grid-item').forEach(item => {
    item.addEventListener('click', () => {
      const idx = parseInt(item.getAttribute('data-idx'), 10);
      go(idx);
      toggleGrid();
    });
  });
}

document.getElementById('grid-close').addEventListener('click', toggleGrid);

/* --- Help Guide Modal --- */
const helpModal = document.getElementById('help-modal');
function toggleHelp() {
  helpModal.classList.toggle('open');
}
document.getElementById('btn-help').addEventListener('click', toggleHelp);
document.getElementById('help-close-btn').addEventListener('click', toggleHelp);

/* --- Toast Notifications --- */
function showToast(msg, duration = 3000) {
  let toast = document.querySelector('.export-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.className = 'export-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  
  if (duration > 0) {
    setTimeout(() => {
      toast.style.opacity = '0';
    }, duration);
  }
}

/* --- Export to PPTX Document --- */
async function exportToPPTX() {
  showToast('正在从 _pdf_frames 准备高清幻灯片图片...', 0);
  
  try {
    const pptx = new PptxGenJS();
    pptx.layout = 'LAYOUT_16x9';
    
    // 循环转换 52 页幻灯片，直接将截屏大图铺满每一页
    for (let i = 0; i < D.length; i++) {
      showToast(`正在生成幻灯片：${i+1} / ${D.length} 页...`, 0);
      const slide = pptx.addSlide();
      slide.background = { color: '08080C' };
      
      const imgNum = i + 1;
      const imgPath = `../_pdf_frames/slide-${String(imgNum).padStart(2, '0')}.png`;
      
      slide.addImage({
        path: imgPath,
        x: 0,
        y: 0,
        w: 13.33,
        h: 7.5
      });
    }
    
    showToast('正在合并与导出 PPTX 文件，请稍候...', 0);
    await pptx.writeFile({ fileName: '手机剪辑零基础入门课_图片版' });
    showToast('💾 PPTX 课件成功保存并下载！', 4000);
    
  } catch (error) {
    console.error("PPTX 导出发生异常: ", error);
    showToast('❌ 导出 PPTX 失败，请检查 _pdf_frames 目录或重试。', 4000);
  }
}

/* ==========================================================================
   Navigation and Global Input Events
   ========================================================================== */

/* Button Click Listeners */
document.getElementById('prev').addEventListener('click', () => go(cur - 1));
document.getElementById('next').addEventListener('click', () => go(cur + 1));

document.getElementById('btn-prev').addEventListener('click', () => go(cur - 1));
document.getElementById('btn-next').addEventListener('click', () => go(cur + 1));
document.getElementById('btn-play').addEventListener('click', toggleAutoplay);
document.getElementById('btn-pen').addEventListener('click', togglePen);
document.getElementById('btn-laser').addEventListener('click', toggleLaser);
document.getElementById('btn-clear').addEventListener('click', clearDrawing);
document.getElementById('btn-grid').addEventListener('click', toggleGrid);
document.getElementById('btn-fullscreen').addEventListener('click', toggleFullscreen);
document.getElementById('btn-export').addEventListener('click', exportToPPTX);
document.getElementById('btn-pdf').addEventListener('click', () => window.print());

/* Keyboard controls */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { 
    e.preventDefault(); 
    go(cur + 1); 
  }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { 
    e.preventDefault(); 
    go(cur - 1); 
  }
  if (e.key === 'Home') { e.preventDefault(); go(0); }
  if (e.key === 'End') { e.preventDefault(); go(D.length - 1); }
  
  // Shortcut keys
  if (e.key === 'f' || e.key === 'F') { e.preventDefault(); toggleFullscreen(); }
  if (e.key === 'p' || e.key === 'P') { e.preventDefault(); togglePen(); }
  if (e.key === 'l' || e.key === 'L') { e.preventDefault(); toggleLaser(); }
  if (e.key === 'c' || e.key === 'C') { e.preventDefault(); clearDrawing(); }
  if (e.key === 'g' || e.key === 'G') { e.preventDefault(); toggleGrid(); }
  if (e.key === 'Esc' || e.key === 'Escape') {
    e.preventDefault();
    if (gridOpen) toggleGrid();
    else if (penMode) togglePen();
    else if (laserMode) toggleLaser();
    else if (document.fullscreenElement) toggleFullscreen();
  }
});

/* Touch / Swipe controls */
let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) go(cur + (dx < 0 ? 1 : -1));
}, { passive: true });

/* Mouse wheel controls */
let wheelTimer = null;
document.addEventListener('wheel', e => {
  if (wheelTimer) return;
  wheelTimer = setTimeout(() => { wheelTimer = null; }, 600);
  if (e.deltaY > 0 || e.deltaX > 0) go(cur + 1);
  else go(cur - 1);
}, { passive: true });

updateUI();
</script>
